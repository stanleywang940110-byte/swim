<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式專題：海流中的救援</title>
    <!-- 引入高質感的 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-layer" class="game-layer">
        
        <!-- 現代極簡、高雅的柔和海洋色系 -->
        <div class="ocean-background">
            <svg class="ocean-wave wave-back" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                 <path d="M0,450 Q250,550 500,450 T1000,450 L1000,1000 L0,1000 Z" fill="#0369a1" />
            </svg>
            <svg class="ocean-wave wave-mid" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                 <path d="M0,550 Q250,450 500,550 T1000,550 L1000,1000 L0,1000 Z" fill="#0284c7" />
            </svg>
            <svg class="ocean-wave wave-front" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                 <path d="M0,650 Q250,750 500,650 T1000,650 L1000,1000 L0,1000 Z" fill="#38bdf8" />
                 <path d="M0,640 Q250,740 500,640 T1000,640 L1000,660 T500,660 Q250,760 0,660 Z" fill="rgba(255,255,255,0.7)" />
            </svg>
        </div>

        <!-- 現代化優雅報紙/新聞 UI -->
        <div id="start-ui" class="start-ui">
            <div class="ui-content">
                <span class="news-tag">專題互動</span>
                <h1 class="start-title">危急時刻</h1>
                <p class="start-desc">突遇離岸流，請立刻前往海中進行救援！<br>點擊以抵抗水流。</p>
                <button id="start-btn" class="start-btn">開始救援</button>
            </div>
        </div>

        <!-- 遊戲進行 UI -->
        <div id="game-ui" class="game-ui hide">
            <h2 class="game-title">與海流搏鬥</h2>
            <p class="game-instruction">快速點擊游向目標！留意漂流的救生圈。</p>
            <div class="progress-container">
                <div id="progress-bar-wrap" class="progress-bar-wrap">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="progress-text"><span id="distance-text">0</span> / 130 <span>m</span></div>
            </div>
        </div>

        <!-- 瘋狗浪警告 -->
        <div id="surge-warning" class="surge-warning hide">
            <h2>⚠️ 浪潮加劇</h2>
        </div>

        <!-- 柔和高級的沙灘配色 -->
        <div id="beach-layer" class="beach-layer">
            <svg viewBox="0 0 1000 300" preserveAspectRatio="none" class="beach-svg">
               <path d="M0,35 Q250,75 500,45 T1000,65 L1000,300 L0,300 Z" fill="#ffffff" />
               <path d="M0,50 Q250,90 500,60 T1000,80 L1000,300 L0,300 Z" fill="#fde68a" />
               <path d="M0,80 Q250,110 500,90 T1000,105 L1000,300 L0,300 Z" fill="#fcd34d" />
            </svg>
        </div>

        <!-- 扁平現代風角色 (無邊框、精緻配色) -->
        <div id="swimmer" class="swimmer intro-standby">
            <svg class="swimmer-icon" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                     <filter id="shadow">
                          <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#023e8a" flood-opacity="0.3"/>
                     </filter>
                </defs>
                <g filter="url(#shadow)">
                    <!-- 優雅的膚色與手臂 -->
                    <path class="arm arm-left" d="M 70 140 C 30 70, 30 15, 50 15 C 65 15, 70 40, 85 120 Z" fill="#fbbd8b" />
                    <path class="arm arm-right" d="M 130 140 C 170 70, 170 15, 150 15 C 135 15, 130 40, 115 120 Z" fill="#fbbd8b" />
                    <!-- 沈穩的莫蘭迪色系上衣 -->
                    <path d="M 40 200 C 40 110, 160 110, 160 200 Z" fill="#ef4444" />
                    <!-- 領口 -->
                    <path d="M 85 200 C 85 145, 115 145, 115 200 Z" fill="#fbbd8b" />
                    <!-- 優雅的帽子與陰影邊緣 -->
                    <path d="M 65 95 C 65 30, 135 30, 135 95 C 135 110, 65 110, 65 95 Z" fill="#1e293b" />
                    <path d="M 60 80 C 100 50, 140 80, 140 80" stroke="#0f172a" stroke-width="4" stroke-linecap="round" fill="none" />
                </g>
            </svg>
            <div class="water-splash"></div>
            <div class="water-trail"></div>
        </div>

        <div id="lifesavers-container"></div>
        <div id="click-effects"></div>
        <div id="dive-splash-container"></div>
    </div>

    <!-- 新聞閱讀層 (優雅無框設計) -->
    <div id="news-layer" class="news-layer hide">
        <header class="news-header">
            <div class="header-overlay">
                <h1 class="news-title">海流中的救援<br>救生員這不為人知的生死瞬間</h1>
            </div>
        </header>

        <main class="news-content">
            <div class="skeleton-line skeleton-lead"></div>
            <div class="skeleton-line skeleton-lead"></div>
            <div class="skeleton-line skeleton-lead" style="width: 60%; margin-bottom: 40px;"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
        </main>
        <footer class="news-footer">
            <p>感謝您的體驗</p>
            <button id="replay-btn" class="replay-btn">再次遊玩</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
